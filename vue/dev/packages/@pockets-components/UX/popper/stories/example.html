<pockets-popper
    :triggers="['hover']"
    theme='generic-popper'
    :auto-hide='true'
    no-auto-focus
    placement='top-start'
>
    <div
        class='p-2 bg-black'
    >
        I am some content. Hover over me.
    </div>
    <template #popper>
        <div class="p-1 bg-black text-white">
            Hello world
        </div>
    </template>
</pockets-popper>
