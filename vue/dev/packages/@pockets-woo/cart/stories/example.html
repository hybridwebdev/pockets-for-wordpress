<pockets-woo-cart
    v-bind='props'
    #default='cart'
>
    <div class='results p-2 bg-grey-800 text-white loading-container' :loading='cart.isLoading'>
        <pre>{{ cart }}</pre>
        <button @click='cart.api.hash++' class='btn btn-confirm'>
            Refresh Cart
        </button>
    </div>
</pockets-woo-cart>
